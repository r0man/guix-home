name: test
on: [push, workflow_dispatch]
jobs:
  build:
    name: Test guix-home
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Guix cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/guix
          key: guix-cache-${{ github.sha }}
          restore-keys: |
            guix-cache-
      - name: Install Guix
        uses: PromyLOPh/guix-install-action@v1
      - name: Ensure no locale warning
        run: test -z "$(guix --version 2>&1 >/dev/null)"
      - name: Clone asahi-guix channel (cross-channel build dep)
        # Many home modules import (asahi guix ...).  Without
        # asahi-guix on GUILE_LOAD_PATH, `make` fails with
        # `no code for module (asahi guix initrd)`.  pre-inst-env
        # honours R0MAN_EXTRA_LOAD_PATH so we just clone and point.
        run: git clone --depth 1 https://codeberg.org/asahi-guix/channel.git /tmp/asahi-guix
      - name: Clone r0man-channel (cross-channel build dep)
        # home/system modules import (r0man guix packages ...) from
        # the sister r0man-channel (guix-channel) repo.
        run: git clone --depth 1 https://github.com/r0man/guix-channel.git /tmp/r0man-channel
      - name: Bootstrap, configure, build, test
        run: |
          guix shell -D -f guix.scm --pure \
            --preserve=^R0MAN_EXTRA_LOAD_PATH$ \
            --preserve=^GUILE_AUTO_COMPILE$ \
            -- bash -c '
              set -e
              ./bootstrap
              ./configure
              make -j"$(nproc)"
              make check
            '
        env:
          R0MAN_EXTRA_LOAD_PATH: /tmp/asahi-guix/modules:/tmp/asahi-guix/system-tests/modules:/tmp/r0man-channel/modules
          GUILE_AUTO_COMPILE: fresh
      # NOTE: `make check-system` is intentionally NOT run here.
      # System tests boot a real QEMU VM via Guix marionette, which
      # requires /dev/kvm.  GitHub-hosted runners do not expose
      # /dev/kvm, so the boot would either time out or take 30+
      # minutes per test.  Run system tests on a self-hosted runner
      # gated by `runs-on: [self-hosted, kvm]`, or locally:
      #   R0MAN_EXTRA_LOAD_PATH=... make check-system
